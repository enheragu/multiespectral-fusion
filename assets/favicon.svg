<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Multiespectral Fusion favicon">
  <rect width="64" height="64" rx="12" fill="#0d1117"/>
  <rect x="4" y="4" width="56" height="56" rx="9" fill="#161b22"/>
  <!-- Fusion mark: four channel bars combined (matches the og-image) -->
  <g fill="none" stroke-width="6.5" stroke-linecap="round">
    <line x1="32" y1="14" x2="32" y2="50" stroke="#E3474A"/>   <!-- R | -->
    <line x1="14" y1="32" x2="50" y2="32" stroke="#3FB950"/>   <!-- G - -->
    <line x1="19" y1="19" x2="45" y2="45" stroke="#58A6FF"/>   <!-- B \ -->
    <line x1="19" y1="45" x2="45" y2="19" stroke="#FF8C00"/>   <!-- T / -->
  </g>
</svg>
